<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo -->
  <rect width="64" height="64" rx="10" fill="#0b0f14"/>

  <!-- Grid técnico (mais sutil) -->
  <g stroke="#1a2330" stroke-width="0.6" opacity="0.6">
    <line x1="0" y1="16" x2="64" y2="16"/>
    <line x1="0" y1="32" x2="64" y2="32"/>
    <line x1="0" y1="48" x2="64" y2="48"/>
    <line x1="16" y1="0" x2="16" y2="64"/>
    <line x1="32" y1="0" x2="32" y2="64"/>
    <line x1="48" y1="0" x2="48" y2="64"/>
  </g>

  <!-- Ferradura -->
  <path d="
    M32 11
    C19 11 13 22 13 34
    C13 45 19 51 23 51
    L23 46
    C20 45 17 40 17 34
    C17 25 22 15 32 15
    C42 15 47 25 47 34
    C47 40 44 45 41 46
    L41 51
    C45 51 51 45 51 34
    C51 22 45 11 32 11
    Z"
    fill="none"
    stroke="#9aa4af"
    stroke-width="2"
  />

  <!-- Parafusos -->
  <g fill="#9aa4af">
    <circle cx="23" cy="21" r="1.3"/>
    <circle cx="41" cy="21" r="1.3"/>
    <circle cx="19" cy="32" r="1.3"/>
    <circle cx="45" cy="32" r="1.3"/>
  </g>

  <!-- Roseta simplificada (legível em favicon) -->
  <g transform="translate(32,42)" stroke="#e6edf3" stroke-width="1.6">
    <line x1="0" y1="-5" x2="0" y2="5"/>
    <line x1="-5" y1="0" x2="5" y2="0"/>
  </g>

  <!-- Ponto central -->
  <circle cx="32" cy="32" r="2" fill="#22d3ee"/>

  <!-- Cubo 3D reduzido -->
  <g stroke="#22d3ee" stroke-width="1.3" fill="none">
    <polygon points="39,13 48,18 39,23 30,18"/>
    <polygon points="39,23 48,18 48,27 39,32"/>
    <polygon points="39,23 30,18 30,27 39,32"/>
  </g>
</svg>